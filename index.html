<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hakediş Pro - Desktop Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
  /* --- GLOBAL MASAÜSTÜ AYARLARI --- */
  body, html {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden; /* Dış sayfa kaydırmasını kapat (Desktop hissi) */
    background-color: #f1f5f9; /* slate-100 */
    color: #1e293b;
  }

  /* --- MASAÜSTÜ SCROLLBAR (CUSTOM) --- */
  ::-webkit-scrollbar {
    width: 8px;
    height: 8px;
  }
  ::-webkit-scrollbar-track {
    background: transparent;
  }
  ::-webkit-scrollbar-thumb {
    background: #cbd5e1; /* slate-300 */
    border-radius: 4px;
  }
  ::-webkit-scrollbar-thumb:hover {
    background: #94a3b8; /* slate-400 */
  }

  /* --- RAPOR SAYFASI TASARIMI (Baskı ve Önizleme) --- */
  .report-page {
    width: 210mm;
    min-height: 296mm; /* 297mm olan bu değeri 296mm yapın */
    padding: 15mm;
    margin: 20px auto;
    background: white;
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    box-sizing: border-box;
    position: relative;
    page-break-after: always;
    break-after: page;
  }

  /* --- KUSURSUZ PDF VE YAZDIRMA (CTRL+P) AYARLARI --- */
  @media print {
    @page { 
      size: A4 portrait; 
      margin: 10mm; 
    }
    
    /* Yazdırırken tüm scroll ve height limitlerini sıfırla */
    html, body, #root { 
      background: white !important; 
      -webkit-print-color-adjust: exact !important; 
      print-color-adjust: exact !important; 
      overflow: visible !important; 
      height: auto !important;
      min-height: auto !important;
    }
    
    .no-print { display: none !important; }
    
    /* Konteyner sınırlarını tam A4 genişliğine yayıyoruz */
    #report-container {
      width: 100% !important;
      display: block !important;
      overflow: visible !important;
    }

    .report-page {
      width: 100% !important;
      max-width: 100% !important;
      margin: 0 !important;
      padding: 0 !important;
      box-shadow: none !important;
      border: none !important;
      min-height: 276mm !important; 
      position: relative !important; 
      page-break-after: always;
      break-after: page;
      display: block !important; 
    }

    .report-page:last-child {
      page-break-after: auto !important;
      break-after: auto !important;
    }

    /* --- TABLO DÜZENLEMELERİ --- */
    table {
      page-break-inside: auto !important;
      border-collapse: collapse !important;
      width: 100% !important;
    }

    /* Tablo sarkarsa Başlıkları (thead) yeni sayfada tekrar yazdırır */
    thead {
      display: table-header-group !important;
    }

    /* Tablo satırlarının ve imza bloklarının ortadan İKİYE BÖLÜNMESİNİ engeller */
    tr, td, th, .avoid-break {
      page-break-inside: avoid !important;
      break-inside: avoid !important;
    }
  }
</style>
    
    <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.3",
    "vite": "https://esm.sh/vite@^7.3.1",
    "html2pdf.js": "https://esm.sh/html2pdf.js@^0.14.0"
  }
}
</script>
  </head>
  <body class="text-sm font-sans antialiased">
    <div id="root" class="h-full w-full"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
